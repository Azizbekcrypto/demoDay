<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Demoday Baraban</title>
<style>
  :root {
    /* CoddyCamp brend ranglari: coral (--gold) + to'q ko'k */
    --gold: #ff6a3d; --gold-2: #ff8a5c; --green: #4f9df5;
    --navy-text: #1b2a4a; --card: rgba(255,255,255,0.06); --border: rgba(255,255,255,0.14);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif; min-height: 100vh; color: #f1f5f9;
    display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
    background:
      radial-gradient(1200px 700px at 12% -8%, #4338ca 0%, transparent 52%),
      radial-gradient(1100px 700px at 92% 6%, #0e7490 0%, transparent 50%),
      radial-gradient(900px 600px at 50% 110%, #6d28d9 0%, transparent 55%),
      linear-gradient(135deg, #0f172a, #1e1b4b);
    background-attachment: fixed;
  }
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,.25), transparent),
      radial-gradient(2px 2px at 70% 60%, rgba(255,255,255,.18), transparent),
      radial-gradient(1.5px 1.5px at 40% 80%, rgba(255,255,255,.2), transparent),
      radial-gradient(1.5px 1.5px at 85% 20%, rgba(255,255,255,.15), transparent);
  }
  header, .stage, .annotation, footer { position: relative; z-index: 1; }

  .lang { position: fixed; top: 18px; right: 18px; z-index: 10; display: flex;
    background: rgba(255,255,255,.08); border: 1px solid var(--border); border-radius: 999px;
    padding: 4px; backdrop-filter: blur(8px); }
  .lang button { border: none; background: transparent; color: #cbd5e1; font-weight: 800;
    font-size: 14px; padding: 7px 16px; border-radius: 999px; cursor: pointer; transition: .2s; }
  .lang button.active { background: linear-gradient(90deg,var(--gold),var(--gold-2)); color: #1e1b4b; }

  header { text-align: center; margin: 38px 0 6px; padding: 0 16px; }
  .brand { position: fixed; top: 16px; left: 16px; z-index: 10; background: #fff;
    border-radius: 14px; padding: 8px 12px;
    box-shadow: 0 10px 24px rgba(255,106,61,.25), 0 4px 12px rgba(0,0,0,.35); }
  .brand img { display: block; width: clamp(92px, 16vw, 128px); height: auto; }
  header .kicker { text-transform: uppercase; letter-spacing: 5px; font-size: 12px;
    color: var(--gold); margin-bottom: 10px; font-weight: 800; }
  header h1 { font-size: clamp(30px,5.5vw,54px); font-weight: 900; letter-spacing: -.5px;
    background: linear-gradient(90deg,#ffb199,#ff6a3d,#ff8a5c);
    -webkit-background-clip: text; background-clip: text; color: transparent; }
  header p { color: #c7d2fe; margin-top: 12px; font-size: 15px; }

  .stage { display: flex; align-items: center; justify-content: center;
    gap: clamp(16px,3vw,44px); flex-wrap: wrap; width: 100%; max-width: 1600px; padding: 26px 16px; }
  .wheel-box { display: flex; flex-direction: column; align-items: center; }
  .wheel-title { font-size: 20px; font-weight: 800; margin-bottom: 18px;
    display: flex; align-items: center; gap: 9px; text-shadow: 0 2px 10px rgba(0,0,0,.4); }
  .wheel-box.weeks .wheel-title { color: var(--gold); }
  .wheel-box.bot .wheel-title { color: var(--green); }
  .wheel-title .dot { width: 10px; height: 10px; border-radius: 50%; background: currentColor; }

  .canvas-wrap { position: relative; transition: filter .3s; }
  .canvas-wrap.spin.weeks { filter: drop-shadow(0 0 30px rgba(251,191,36,.55)); }
  .canvas-wrap.spin.bot { filter: drop-shadow(0 0 30px rgba(52,211,153,.55)); }
  canvas { display: block; border-radius: 50%;
    width: clamp(300px, 34vw, 528px); height: auto;
    box-shadow: 0 0 0 10px rgba(255,255,255,.10), 0 0 0 13px rgba(0,0,0,.30), 0 22px 55px rgba(0,0,0,.55); }
  .pointer { position: absolute; top: -6px; left: 50%; transform: translateX(-50%);
    width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent;
    border-top: 32px solid var(--gold); filter: drop-shadow(0 4px 4px rgba(0,0,0,.55)); z-index: 6; }
  .hub { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 70px; height: 70px; border-radius: 50%; background: #fff; border: 4px solid var(--navy-text);
    box-shadow: 0 6px 16px rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center;
    z-index: 5; font-weight: 900; font-size: 13px; color: var(--navy-text); }

  .pop { margin-top: 20px; font-size: 20px; font-weight: 900; text-align: center;
    padding: 11px 24px; border-radius: 14px; background: #fff; color: var(--navy-text);
    min-height: 24px; max-width: 320px; opacity: 0; transform: scale(.4); }
  .pop.show { animation: pop .5s cubic-bezier(.2,1.6,.4,1) forwards; }
  .wheel-box.weeks .pop.show { box-shadow: 0 0 26px rgba(251,191,36,.5); outline: 3px solid var(--gold); }
  .wheel-box.bot .pop.show { box-shadow: 0 0 26px rgba(52,211,153,.5); outline: 3px solid var(--green); }
  @keyframes pop { 0%{opacity:0;transform:scale(.4);} 60%{opacity:1;transform:scale(1.14);} 100%{opacity:1;transform:scale(1);} }

  .center-control { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .vs { font-size: 26px; font-weight: 900; color: rgba(255,255,255,.25); letter-spacing: 2px; }
  .spin-btn { font-size: 19px; font-weight: 900; letter-spacing: 1px; color: #1e1b4b;
    background: linear-gradient(90deg,var(--gold),var(--gold-2)); border: none;
    padding: 19px 42px; border-radius: 999px; cursor: pointer; box-shadow: 0 12px 32px rgba(245,158,11,.45);
    transition: transform .15s, box-shadow .15s; white-space: nowrap; }
  .spin-btn:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 18px 44px rgba(245,158,11,.6); }
  .spin-btn:active { transform: translateY(0); }
  .spin-btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }
  .reset-btn { display: none; background: transparent; border: 1px solid var(--border);
    color: #cbd5e1; font-weight: 700; font-size: 13px; padding: 9px 18px; border-radius: 999px;
    cursor: pointer; transition: .2s; }
  .reset-btn:hover { background: rgba(255,255,255,.08); color: #fff; }

  .annotation { width: 92%; max-width: 940px; margin: 14px auto 44px;
    background: var(--card); border: 1px solid var(--border); border-top: 4px solid var(--gold);
    border-radius: 18px; padding: 30px 34px; backdrop-filter: blur(12px);
    box-shadow: 0 22px 55px rgba(0,0,0,.45); opacity: 0; transform: translateY(20px);
    transition: opacity .45s, transform .45s; display: none; }
  .annotation.show { display: block; opacity: 1; transform: translateY(0); }
  .ann-head { text-transform: uppercase; letter-spacing: 2px; font-size: 12px;
    color: var(--gold); text-align: center; margin-bottom: 6px; }
  .ann-title { text-align: center; font-size: clamp(20px,3vw,28px); font-weight: 800;
    margin-bottom: 24px; color: #fff; }
  .ann-item { display: flex; gap: 16px; padding: 18px 0; border-top: 1px solid var(--border); }
  .ann-item:first-of-type { border-top: none; }
  .ann-badge { flex-shrink: 0; width: 130px; }
  .ann-badge .src { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; }
  .ann-badge .short { display: inline-block; margin-top: 7px; font-size: 16px; font-weight: 900;
    color: #1e1b4b; padding: 7px 12px; border-radius: 8px; }
  .ann-item.weeks .short { background: var(--gold); }
  .ann-item.bot .short { background: var(--green); }
  .ann-body { flex: 1; }
  .ann-body .h { font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 6px; }
  .ann-body .d { font-size: 15px; line-height: 1.75; color: #cbd5e1; }

  footer { width: 100%; background: rgba(0,0,0,.4); border-top: 1px solid var(--border);
    padding: 16px; text-align: center; color: #94a3b8; font-size: 13px; margin-top: auto; }
  .confetti { position: fixed; top: -12px; width: 10px; height: 16px; z-index: 999;
    pointer-events: none; border-radius: 2px; }

  @media (max-width: 900px) {
    .vs { display: none; } .center-control { order: 3; width: 100%; }
    .ann-item { flex-direction: column; gap: 8px; } .ann-badge { width: auto; }
  }
</style>
</head>
<body id="top">

  <div class="lang">
    <button id="btnUz" class="active" data-lang="uz">UZ</button>
    <button id="btnRu" data-lang="ru">RU</button>
  </div>

  <header>
    <div class="brand"><img src="coddycamp.jpg" alt="CoddyCamp IT Academy" /></div>
    <div class="kicker" id="kicker">Demoday</div>
    <h1 id="title">🎡 Vazifa Barabani</h1>
    <p id="subtitle">Ikkala barabanni aylantiring — tanlangan vazifa pastda ochiladi</p>
  </header>

  <main class="stage">
    <div class="wheel-box weeks">
      <div class="wheel-title"><span class="dot"></span> <span id="weeksTitle">Wix bo'yicha</span></div>
      <div class="canvas-wrap weeks" id="wrapWeeks">
        <div class="pointer"></div>
        <canvas id="wheelWeeks" width="528" height="528"></canvas>
        <div class="hub">WIX</div>
      </div>
      <div class="pop" id="popWeeks"></div>
    </div>

    <div class="center-control">
      <div class="vs">VS</div>
      <button class="spin-btn" id="spinBtn">🎲 AYLANTIRISH</button>
      <button class="reset-btn" id="resetBtn">↺ Qayta boshlash</button>
    </div>

    <div class="wheel-box bot">
      <div class="wheel-title"><span class="dot"></span> <span id="botTitle">Telegram bot bo'yicha</span></div>
      <div class="canvas-wrap bot" id="wrapBot">
        <div class="pointer"></div>
        <canvas id="wheelBot" width="528" height="528"></canvas>
        <div class="hub">BOT</div>
      </div>
      <div class="pop" id="popBot"></div>
    </div>
  </main>

  <section class="annotation" id="annotation">
    <div class="ann-head" id="annHead">Natija</div>
    <div class="ann-title" id="annTitle">Demoday'da qilishingiz kerak bo'lgan vazifalar</div>
    <div id="annBody"></div>
  </section>

  <footer id="footer">© CoddyCamp IT Academy — Demoday · Vazifa Barabani</footer>

<script>

   ============================================================ */

      { short:"Hayvonot",   title:"Hayvonot do'koni",

      { short:"Shirinlik",  title:"Shirinliklar do'koni",

      { short:"Multfilm",   title:"Sevimli multfilmlarim",

      { short:"Katalog",    title:"Menyu / katalog boti",

      { short:"So'rovnoma", title:"So'rovnoma boti",

      { short:"Maslahat",   title:"Maslahat beruvchi bot",

/* Yorqin, bir-biridan ajralib turadigan ranglar */
const PALETTE = ["#ef4444","#f97316","#f59e0b","#eab308","#a3e635","#22c55e","#10b981","#14b8a6",
                 "#06b6d4","#0ea5e9","#3b82f6","#6366f1","#8b5cf6","#d946ef","#ec4899"];

function secureRandom(n){ const a=new Uint32Array(1); crypto.getRandomValues(a); return a[0]%n; }

class Wheel {
  constructor(id, items){ this.canvas=document.getElementById(id); this.ctx=this.canvas.getContext("2d");
    this.items=items; this.angle=0; this.draw(); }
  setItems(items){ this.items=items; this.angle=0; this.draw(); }
  draw(){
    const ctx=this.ctx, W=this.canvas.width, H=this.canvas.height;
    const cx=W/2, cy=H/2, r=W/2-6, n=this.items.length, seg=2*Math.PI/n;
    const fs = n>12 ? 16 : (n>9 ? 18 : 21);
    ctx.clearRect(0,0,W,H); ctx.save(); ctx.translate(cx,cy); ctx.rotate(this.angle);
    for(let i=0;i<n;i++){
      const s=i*seg;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,r,s,s+seg); ctx.closePath();
      ctx.fillStyle=PALETTE[i%PALETTE.length]; ctx.fill();
      ctx.strokeStyle="#fff"; ctx.lineWidth=2; ctx.stroke();
      ctx.save(); ctx.rotate(s+seg/2); ctx.textAlign="right";
      ctx.font="800 "+fs+"px 'Segoe UI', sans-serif";
      // qora matn + oq kontur — istalgan rangda yaxshi o'qiladi
      ctx.lineWidth=3.5; ctx.strokeStyle="rgba(255,255,255,.9)"; ctx.lineJoin="round";
      ctx.strokeText(this.items[i].short, r-16, fs*0.35);
      ctx.fillStyle="#111111";
      ctx.fillText(this.items[i].short, r-16, fs*0.35);
      ctx.restore();
    }
    ctx.restore();
  }
  spinTo(idx){
    return new Promise(res=>{
      const n=this.items.length, seg=2*Math.PI/n;
      const center=idx*seg+seg/2, pointer=-Math.PI/2, turns=6+secureRandom(3);
      const finalA=turns*2*Math.PI+(pointer-center);
      const start=this.angle%(2*Math.PI), delta=finalA-start, dur=4500;
      let t0=null; const ease=t=>1-Math.pow(1-t,3);
      const step=ts=>{ if(!t0)t0=ts; const t=Math.min((ts-t0)/dur,1);
        this.angle=start+delta*ease(t); this.draw();
        if(t<1) requestAnimationFrame(step); else res(idx); };
      requestAnimationFrame(step);
    });
  }
}

let lang = "uz";

/* Tanlangan (o'yindan chiqqan) variantlar indekslari. Sahifa yangilanganda tozalanadi. */
const usedWeeks = new Set();
const usedBot   = new Set();

function buildRemaining(type){
  const arr = DATA[lang][type];
  const used = (type === "weeks") ? usedWeeks : usedBot;
  const out = [];
  arr.forEach((it, i) => { if (!used.has(i)) out.push(Object.assign({ _idx:i }, it)); });
  return out;
}

const wheelWeeks=new Wheel("wheelWeeks", buildRemaining("weeks"));
const wheelBot=new Wheel("wheelBot", buildRemaining("bot"));

function refreshWheels(){
  wheelWeeks.setItems(buildRemaining("weeks"));
  wheelBot.setItems(buildRemaining("bot"));
}

const spinBtn=document.getElementById("spinBtn");
const resetBtn=document.getElementById("resetBtn");
const popWeeks=document.getElementById("popWeeks");
const popBot=document.getElementById("popBot");
const wrapWeeks=document.getElementById("wrapWeeks");
const wrapBot=document.getElementById("wrapBot");
const annotation=document.getElementById("annotation");
const annBody=document.getElementById("annBody");

function applyLang(l){
  lang=l;
  const t=UI[l];
  document.documentElement.lang=t.htmlLang;
  document.getElementById("kicker").textContent=t.kicker;
  document.getElementById("title").textContent=t.title;
  document.getElementById("subtitle").textContent=t.subtitle;
  document.getElementById("weeksTitle").textContent=t.weeksTitle;
  document.getElementById("botTitle").textContent=t.botTitle;
  document.getElementById("spinBtn").textContent=t.spin;
  document.getElementById("annHead").textContent=t.annHead;
  document.getElementById("annTitle").textContent=t.annTitle;
  document.getElementById("footer").textContent=t.footer;
  resetBtn.textContent=t.reset;

  refreshWheels();
  annotation.classList.remove("show");
  popWeeks.classList.remove("show");
  popBot.classList.remove("show");

  document.getElementById("btnUz").classList.toggle("active", l==="uz");
  document.getElementById("btnRu").classList.toggle("active", l==="ru");
}
document.getElementById("btnUz").addEventListener("click", ()=>applyLang("uz"));
document.getElementById("btnRu").addEventListener("click", ()=>applyLang("ru"));

function showPop(el, short){ el.textContent=short; el.classList.remove("show"); void el.offsetWidth; el.classList.add("show"); }

function annItem(cls, src, item){
  return '<div class="ann-item '+cls+'">'+
    '<div class="ann-badge"><div class="src">'+src+'</div><span class="short">'+item.short+'</span></div>'+
    '<div class="ann-body"><div class="h">'+item.title+'</div><div class="d">'+item.task+'</div></div></div>';
}

function confetti(){
  for(let i=0;i<90;i++){
    const c=document.createElement("div"); c.className="confetti";
    c.style.left=secureRandom(100)+"vw";
    c.style.background=["#ff6a3d","#ff8a5c","#ffb199","#4f9df5","#1b2a4a","#ffd1bf"][secureRandom(6)];
    c.style.transform="rotate("+secureRandom(360)+"deg)";
    document.body.appendChild(c);
    c.animate([{top:"-12px",opacity:1},{top:"100vh",opacity:.2}],
      {duration:2200+secureRandom(1600),easing:"ease-in"}).onfinish=()=>c.remove();
  }
}

function showAllDone(){
  const t=UI[lang];
  annBody.innerHTML='<p style="text-align:center;color:#cbd5e1;font-size:17px;line-height:1.7">'+t.allDone+'</p>';
  annotation.classList.add("show");
  resetBtn.style.display="inline-flex";
  annotation.scrollIntoView({behavior:"smooth", block:"nearest"});
}

function doReset(){
  usedWeeks.clear(); usedBot.clear();
  refreshWheels();
  annotation.classList.remove("show");
  popWeeks.classList.remove("show");
  popBot.classList.remove("show");
  resetBtn.style.display="none";
}
resetBtn.addEventListener("click", doReset);

spinBtn.addEventListener("click", async ()=>{
  const t=UI[lang];
  if(!wheelWeeks.items.length || !wheelBot.items.length){ showAllDone(); return; }

  spinBtn.disabled=true;
  annotation.classList.remove("show");
  popWeeks.classList.remove("show");
  popBot.classList.remove("show");
  document.getElementById("top").scrollIntoView({behavior:"smooth", block:"start"});

  wrapWeeks.classList.add("spin"); wrapBot.classList.add("spin");

  const remW=wheelWeeks.items, remB=wheelBot.items;
  const pW=secureRandom(remW.length), pB=secureRandom(remB.length);
  const [rW,rB]=await Promise.all([ wheelWeeks.spinTo(pW), wheelBot.spinTo(pB) ]);

  wrapWeeks.classList.remove("spin"); wrapBot.classList.remove("spin");

  const wItem=remW[rW], bItem=remB[rB];
  usedWeeks.add(wItem._idx);
  usedBot.add(bItem._idx);

  showPop(popWeeks, wItem.short);
  showPop(popBot, bItem.short);

  annBody.innerHTML = annItem("weeks", t.weeksFrom, wItem) + annItem("bot", t.botFrom, bItem);
  annotation.classList.add("show");
  confetti();
  resetBtn.style.display="inline-flex";
  setTimeout(()=>annotation.scrollIntoView({behavior:"smooth", block:"nearest"}), 350);
  setTimeout(refreshWheels, 850);

  spinBtn.disabled=false;
});
</script>
